<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skim — settings</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color-scheme: light dark;
      }
      body {
        max-width: 640px;
        margin: 40px auto;
        padding: 0 16px;
        line-height: 1.5;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
      }
      input[type="password"] {
        width: 100%;
        padding: 10px;
        font: inherit;
      }
      button {
        margin-top: 12px;
        padding: 10px 16px;
        font: inherit;
        cursor: pointer;
      }
      .note {
        color: #5f6368;
        font-size: 14px;
        margin-top: 8px;
      }
      .ok {
        color: #137333;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Skim settings</h1>
    <p>
      Your API key is stored only in this browser via <code>chrome.storage.local</code>. It is sent directly to
      OpenAI from the extension — there is no Skim backend.
    </p>
    <form id="form">
      <label for="key">OpenAI API key</label>
      <input id="key" name="key" type="password" autocomplete="off" placeholder="sk-…" />
      <button type="submit">Save</button>
      <p id="status" class="ok" hidden>Saved.</p>
    </form>
    <p class="note">
      Use an API key with access to chat completions and embeddings. See README for privacy notes.
    </p>
    <script type="module" src="options.js"></script>
  </body>
</html>
